name: Release

# Pushing a tag like `v0.0.6` triggers:
#   1. Build a signed AAB + APK using the version derived from the tag.
#   2. Upload to the Play Store (internal track) via Gradle Play Publisher.
#   3. Create a GitHub release with the AAB + APK attached.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   RELEASE_KEYSTORE_BASE64    base64 of keystore/release.keystore
#                              (`base64 -w0 keystore/release.keystore`)
#   STORE_PASSWORD             keystore password
#   KEY_ALIAS                  signing key alias
#   KEY_PASSWORD               signing key password
#   PLAY_SERVICE_ACCOUNT_JSON  full JSON contents of the Play Console
#                              service-account key

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # for softprops/action-gh-release
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Extract version from tag
        id: ver
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "name=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "code=$CODE"     >> "$GITHUB_OUTPUT"
          echo "Release $VERSION → versionCode $CODE"

      - name: Decode release keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > keystore/release.keystore
          ls -la keystore/

      - name: Write signing.properties
        run: |
          cat > signing.properties <<EOF
          STORE_FILE=keystore/release.keystore
          STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Write Play service-account JSON
        env:
          PLAY_SA_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$PLAY_SA_JSON" > play-service-account.json
          # Sanity check: must be valid JSON.
          python3 -c "import json,sys; json.load(open('play-service-account.json')); print('Service account JSON OK')"

      - name: Build signed AAB and APK
        run: |
          ./gradlew bundleRelease assembleRelease \
            -PappVersionName=${{ steps.ver.outputs.name }} \
            -PappVersionCode=${{ steps.ver.outputs.code }} \
            --no-daemon --stacktrace

      - name: Publish to Play Store (internal track + listing + screenshots)
        run: |
          ./gradlew publishReleaseApps \
            -PappVersionName=${{ steps.ver.outputs.name }} \
            -PappVersionCode=${{ steps.ver.outputs.code }} \
            --no-daemon --stacktrace

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab

      - name: Clean up secrets from workspace
        if: always()
        run: |
          rm -f play-service-account.json signing.properties
          rm -rf keystore
